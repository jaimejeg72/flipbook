<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Libro Digital</title>
<meta name="description" content="Flipbook interactivo con imagenes reales del libro">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500&family=Lora:ital@1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0c1a;--accent:#c9a84c;--accent-lt:#e8c96d;--accent-dim:#8a6a28;--muted:#9a8f72}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:#f0ead8;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(80,60,160,.35),transparent 70%),
             radial-gradient(ellipse 60% 40% at 20% 80%,rgba(30,20,80,.4),transparent 60%)}
#particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.wrapper{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center}

header{width:100%;padding:1.4rem 2rem .6rem;text-align:center}
.eyebrow{font-size:.65rem;letter-spacing:.32em;text-transform:uppercase;color:var(--accent);opacity:.8;margin-bottom:.4rem}
header h1{font-family:'Cinzel',serif;font-size:clamp(1.3rem,3vw,2.2rem);font-weight:700;
  background:linear-gradient(135deg,var(--accent-lt) 20%,var(--accent) 60%,var(--accent-dim));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.06em}
.divider{width:90px;height:1px;margin:.6rem auto;background:linear-gradient(90deg,transparent,var(--accent),transparent)}

.stage{position:relative;display:flex;flex-direction:column;align-items:center;padding:.4rem 1rem 1.2rem;width:100%;flex:1}
#book-container{filter:drop-shadow(0 25px 55px rgba(0,0,0,.75))}

/* ─── PAGES ────────────────────────────────────────
   Spread original: 2500 x 1250 px  (ratio 2:1)
   Cada pagina:     1250 x 1250 px  (ratio 1:1 cuadrado)
   Se usa background-size:200% 100% para mostrar
   solo la mitad izquierda o derecha del spread.
────────────────────────────────────────────────── */
.page{
  overflow:hidden;
  user-select:none;
  background:#0d0d1a;
}
.page-half{
  width:100%;
  height:100%;
  /* La imagen se estira al doble del ancho del contenedor
     para que cada mitad cubra exactamente una pagina */
  background-repeat: no-repeat;
  background-size: 200% 100%;
}
.page-half.left { background-position: 0% 0%; }
.page-half.right{ background-position: 100% 0%; }

/* ─── Controls ── */
.controls{display:flex;align-items:center;gap:.7rem;margin-top:1.2rem;flex-wrap:wrap;justify-content:center}
.btn{display:inline-flex;align-items:center;gap:.38rem;padding:.5rem 1.2rem;border-radius:50px;
  border:1px solid rgba(201,168,76,.38);background:rgba(201,168,76,.07);color:var(--accent-lt);
  font-family:'Inter',sans-serif;font-size:.78rem;font-weight:500;letter-spacing:.04em;
  cursor:pointer;transition:all .18s;backdrop-filter:blur(6px)}
.btn:hover{background:rgba(201,168,76,.2);border-color:var(--accent);
  box-shadow:0 0 16px rgba(201,168,76,.28);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn svg{width:15px;height:15px;fill:currentColor}
.btn:disabled{opacity:.28;cursor:not-allowed;pointer-events:none}
.btn.icon-only{padding:.5rem .75rem}

.page-indicator{font-family:'Cinzel',serif;font-size:.74rem;color:var(--muted);
  letter-spacing:.1em;min-width:130px;text-align:center;line-height:1.4}

.progress-wrap{width:min(700px,90vw);margin-top:.6rem}
.progress-track{height:3px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent-dim),var(--accent-lt));
  border-radius:4px;width:0%;transition:width .4s cubic-bezier(.4,0,.2,1)}

.hint{font-size:.65rem;color:var(--muted);opacity:.55;margin-top:.45rem;
  font-family:'Lora',serif;font-style:italic;text-align:center}
footer{width:100%;text-align:center;padding:.8rem 1rem 1.2rem;
  font-size:.65rem;color:rgba(154,143,114,.3);letter-spacing:.1em}

@keyframes fadeInUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.anim-in{animation:fadeInUp .55s ease both}
.d1{animation-delay:.08s}.d2{animation-delay:.16s}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="wrapper">

<header class="anim-in">
  <div class="eyebrow">Libro Digital Interactivo</div>
  <h1>Mi Libro</h1>
  <div class="divider"></div>
</header>

<div class="stage anim-in d1">
  <div id="book-container">
    <div id="book"></div>
  </div>

  <div class="progress-wrap anim-in d2">
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div class="controls anim-in d2">
    <button class="btn icon-only" id="btn-first" title="Primera pagina">
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>
    <button class="btn" id="btn-prev">
      <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      Anterior
    </button>
    <span class="page-indicator" id="page-indicator">...</span>
    <button class="btn" id="btn-next">
      Siguiente
      <svg viewBox="0 0 24 24"><path d="M10 6 8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
    </button>
    <button class="btn icon-only" id="btn-last" title="Ultima pagina">
      <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 4V8l-5.5 4zM15.5 6v12h2V6h-2z"/></svg>
    </button>
  </div>
  <div class="hint">Flechas del teclado &nbsp;&bull;&nbsp; Clic y arrastra los bordes del libro</div>
</div>

<footer>Mi Libro Digital &mdash; StPageFlip</footer>
</div>

<script>
/* ── Particles ─────────────────────────────────────── */
(function(){
  var c=document.getElementById('particles'),ctx=c.getContext('2d'),W,H,pts;
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  function init(){pts=[];for(var i=0;i<50;i++)pts.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+.2,dx:(Math.random()-.5)*.12,dy:(Math.random()-.5)*.12,o:Math.random()*.45+.08});}
  function draw(){ctx.clearRect(0,0,W,H);pts.forEach(function(p){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(201,168,76,'+p.o+')';ctx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;});requestAnimationFrame(draw);}
  resize();init();draw();
  window.addEventListener('resize',function(){resize();init();});
})();

/* ── Image spreads (sorted, sin duplicados) ─────────── */
var spreads=[
  'pages/page 01-02.jpg','pages/page 03-04.jpg','pages/page 05-06.jpg',
  'pages/page 07-08.jpg','pages/page 09-10.jpg','pages/page 11-12.jpg',
  'pages/page 13-14.jpg','pages/page 15-16.jpg','pages/page 17-18.jpg',
  'pages/page 19-20.jpg','pages/page 21-22.jpg','pages/page 23-24.jpg',
  'pages/page 25-26.jpg','pages/page 27-28.jpg','pages/page 35-36.jpg',
  'pages/page 48-49.jpg','pages/page 49-50.jpg','pages/page 50-51.jpg'
];

/* Dimensiones originales del spread: 2500 x 1250
   Cada pagina individual:            1250 x 1250  (ratio 1:1)
   Al abrir el libro (2 paginas):     2500 x 1250  (ratio 2:1) */
var IMG_PAGE_W = 1250;
var IMG_PAGE_H = 1250;
var RATIO = IMG_PAGE_H / IMG_PAGE_W; // = 1.0

/* ── Construir elementos .page ─────────────────────── */
var bookEl=document.getElementById('book');
spreads.forEach(function(src){
  ['left','right'].forEach(function(side){
    var div=document.createElement('div');
    div.className='page';
    var inner=document.createElement('div');
    inner.className='page-half '+side;
    inner.style.backgroundImage="url('"+src+"')";
    div.appendChild(inner);
    bookEl.appendChild(div);
  });
});

/* ── Calcular tamaño optimo respetando aspect ratio ── */
function calcSize(){
  var vw=window.innerWidth;
  var vh=window.innerHeight;
  // Espacio disponible descontando header (~130px) y controles (~110px)
  var availH = vh - 240;
  var availW = vw - 60;

  // El libro abierto mide 2 paginas de ancho → max ancho = availW
  // Cada pagina tiene ratio RATIO (1:1), entonces alto = pageW * RATIO
  // Queremos:  2 * pageW <= availW  y  pageH = pageW*RATIO <= availH
  var byWidth  = Math.floor(availW / 2);
  var byHeight = Math.floor(availH / RATIO);
  var pageW    = Math.min(byWidth, byHeight, 650); // tope de 650px por pagina
  var pageH    = Math.round(pageW * RATIO);
  return {w: pageW, h: pageH};
}

/* ── Init StPageFlip ────────────────────────────────── */
window.addEventListener('DOMContentLoaded',function(){
  var sz=calcSize();

  var pageFlip=new St.PageFlip(bookEl,{
    width:            sz.w,
    height:           sz.h,
    showCover:        false,
    mobileScrollSupport: false,
    maxShadowOpacity: 0.55,
    flippingTime:     650,
    usePortrait:      false,
    drawShadow:       true,
    autoSize:         false   // desactivado para respetar nuestro ratio exacto
  });

  pageFlip.loadFromHTML(bookEl.querySelectorAll('.page'));

  /* ── UI update ─────────────────────────────────────── */
  function updateUI(){
    var cur=pageFlip.getCurrentPageIndex();
    var tot=pageFlip.getPageCount();
    var pct=tot>1?Math.round(cur/(tot-1)*100):0;
    document.getElementById('progress-fill').style.width=pct+'%';

    var spreadCur=Math.floor(cur/2)+1;
    var spreadTot=Math.ceil(tot/2);
    document.getElementById('page-indicator').textContent=
      'Pagina '+spreadCur+' de '+spreadTot;

    document.getElementById('btn-prev').disabled =(cur<2);
    document.getElementById('btn-first').disabled=(cur<2);
    document.getElementById('btn-next').disabled =(cur>=tot-2);
    document.getElementById('btn-last').disabled =(cur>=tot-2);
  }

  pageFlip.on('flip',updateUI);
  pageFlip.on('init',updateUI);

  document.getElementById('btn-prev').addEventListener('click',function(){pageFlip.flipPrev('bottom');});
  document.getElementById('btn-next').addEventListener('click',function(){pageFlip.flipNext('bottom');});
  document.getElementById('btn-first').addEventListener('click',function(){pageFlip.flip(0);});
  document.getElementById('btn-last').addEventListener('click',function(){pageFlip.flip(pageFlip.getPageCount()-2);});

  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key==='ArrowDown') pageFlip.flipNext('bottom');
    if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   pageFlip.flipPrev('bottom');
    if(e.key==='Home') pageFlip.flip(0);
    if(e.key==='End')  pageFlip.flip(pageFlip.getPageCount()-2);
  });

  updateUI();
});
</script>
</body>
</html>
