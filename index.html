(function(){var c=document.getElementById("particles"),ctx=c.getContext("2d"),W,H,pts;function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}function init(){pts=[];for(var i=0;i<45;i++)pts.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1+.2,dx:(Math.random()-.5)*.1,dy:(Math.random()-.5)*.1,o:Math.random()*.35+.07});}function draw(){ctx.clearRect(0,0,W,H);pts.forEach(function(p){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle="rgba(201,168,76,"+p.o+")";ctx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;});requestAnimationFrame(draw);}resize();init();draw();window.addEventListener("resize",function(){resize();init();});})();

var cacheBuster = new Date().getTime();

function loadCovers(callback) {
  if (coverData.files && coverData.files.length > 0 && coverData.type !== 'none') {
    setTimeout(callback, 50);
    return;
  }
  fetch('list_covers.php?t=' + cacheBuster)
    .then(function(res) { return res.json(); })
    .then(function(files) {
      if (files && files.length > 0) {
        coverData.files = files;
        var backFile = files.find(function(f) { return f.toLowerCase().indexOf('backcover') !== -1; });
        var frontFile = files.find(function(f) { return f.toLowerCase().indexOf('backcover') === -1; });
        if (!frontFile && files.length > 0) {
          frontFile = files[0];
        }
        
        var img = new Image();
        img.onload = function() {
          coverData.width = img.width;
          coverData.height = img.height;
          coverData.type = (img.width > img.height * 1.2) ? 'spread' : 'single';
          coverData.frontFile = frontFile;
          coverData.backFile = backFile || null;
          callback();
        };
        img.onerror = function() {
          coverData.type = 'none';
          callback();
        };
        img.src = frontFile + "?t=" + cacheBuster;
      } else {
        coverData.type = 'none';
        callback();
      }
    })
    .catch(function(err) {
      console.warn("Could not load covers list from PHP:", err);
      coverData.type = 'none';
      callback();
    });
}

    // 2. Primeras 2 páginas de guarda (Lining spread - Page 1 & 2)
    ["l","r"].forEach(function(side){
      var gradPage = document.createElement("div");
      gradPage.className = "page";
      gradPage.setAttribute("data-density", coverDn);
      var imgDiv = document.createElement("div");
      imgDiv.className = "ph " + side;
      imgDiv.style.backgroundImage = "url(" + JSON.stringify(liningSrc + "?t=" + cacheBuster) + ")";
      gradPage.appendChild(imgDiv);
      bk.appendChild(gradPage);
    });

    // 3. Páginas del directorio pages/ (Pages 3 to 42)
    spreads.forEach(function(src, si){
      ["l","r"].forEach(function(side){
        var d = document.createElement("div");
        d.className = "page";
        d.setAttribute("data-density", innerDn);
        var imgDiv = document.createElement("div");
        imgDiv.className = "ph " + side;
        imgDiv.style.backgroundImage = "url(" + JSON.stringify(src + "?t=" + cacheBuster) + ")";
        d.appendChild(imgDiv);
        bk.appendChild(d);
      });
    });

    // 4. Últimas 2 páginas de guarda (Lining spread - Page 43 & 44)
    ["l","r"].forEach(function(side){
      var gradPage = document.createElement("div");
      gradPage.className = "page";
      gradPage.setAttribute("data-density", coverDn);
      var imgDiv = document.createElement("div");
      imgDiv.className = "ph " + side;
      imgDiv.style.backgroundImage = "url(" + JSON.stringify(liningSrc + "?t=" + cacheBuster) + ")";
      gradPage.appendChild(imgDiv);
      bk.appendChild(gradPage);
    });

    // 5. Contraportada (Back Cover - Page 45)
    var backCoverPage = document.createElement("div");
    backCoverPage.className = "page";
    backCoverPage.setAttribute("data-density", coverDn);
    if (coverData.backFile) {
      var imgDiv = document.createElement("div");
      imgDiv.className = "ph";
      imgDiv.style.backgroundImage = "url(" + JSON.stringify(coverData.backFile + "?t=" + cacheBuster) + ")";
      imgDiv.style.width = "100%";
      imgDiv.style.height = "100%";
      imgDiv.style.backgroundSize = "contain";
      imgDiv.style.backgroundPosition = "center center";
      imgDiv.style.backgroundRepeat = "no-repeat";
      backCoverPage.appendChild(imgDiv);
    } else {
      var backCoverContent = document.createElement("div");
      backCoverContent.className = "back-cover-wine";
      backCoverContent.innerHTML = '<div class="cover-decoration"></div><div class="cover-subtitle" style="margin-bottom:0">Fin del Libro</div>';
      backCoverPage.appendChild(backCoverContent);
    }
    bk.appendChild(backCoverPage);
  }
}

function calcSize(){
  var vw = window.innerWidth - 40;
  var vh = window.innerHeight - 150;
  var w = Math.min(Math.floor(vw/2), Math.floor(vh/PAGE_RATIO));
  return { w: w, h: Math.round(w*PAGE_RATIO) };
}
var pf=null,sp=0,rt=null;
function gcn(){return "top";}
function gopt(){
  return {
    showCover: (coverData.type === 'single'),
    usePortrait: false,
    drawShadow: true,
    useMouseEvents: true,
    disableFlipByClick: false,
    showPageCorners: true,
    mobileScrollSupport: true,
    clickEventForward: true,
    flippingTime: 700,
    maxShadowOpacity: 0.45,
    swipeDistance: 30,
    autoSize: false
  };
}
function sst(t,c){
  var e=document.getElementById("sbadge");
  if(e){e.textContent="● "+t;e.style.color=c||"var(--green)";}
}
function reinit(){
  if(pf){sp=pf.getCurrentPageIndex();try{pf.destroy();}catch(e){}pf=null;}
  var container = document.getElementById("book-container");
  if(container) {
    container.innerHTML = '<div id="book"></div>';
  }
  loadCovers(function() {
    buildPages();var sz=calcSize();var o=gopt();o.width=sz.w;o.height=sz.h;
    try{pf=new St.PageFlip(document.getElementById("book"),o);pf.loadFromHTML(document.querySelectorAll("#book .page"));
      ae();sst("Activo","var(--green)");
      setTimeout(function(){if(sp>0)pf.turnToPage(sp);ui();},200);
    }catch(err){sst("Error","var(--red)");}
  });
}
var ec={flip:"#c9a84c",changeOrientation:"#4c8fcf",changeState:"#9b6bcf",update:"#4caf82",init:"#4caf82",ERROR:"#cf6b4c"};
function ae(){if(!pf)return;
  pf.on("flip",function(e){setTimeout(ui,50);le("flip","{page:"+e.data+"}");});
  pf.on("changeOrientation",function(e){setTimeout(ui,50);le("changeOrientation",e.data);});
  pf.on("changeState",function(e){le("changeState",e.data);});
  pf.on("update",function(){setTimeout(ui,50);le("update","{}");});
}
function le(n,d){
  var log=document.getElementById("elog");
  if(!log)return;
  var now=new Date();
  var t=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0")+":"+now.getSeconds().toString().padStart(2,"0");
  var el=document.createElement("div");
  el.className="ev";
  el.innerHTML="<span class=et>"+t+"</span><span class=en style=color:"+(ec[n]||"#aaa")+">"+n+"</span><span class=ed>"+d+"</span>";
  var ph=log.querySelector(".en[style*=muted]");
  if(ph)ph.parentElement.remove();
  log.insertBefore(el,log.firstChild);
  if(log.children.length>50)log.removeChild(log.lastChild);
}
function ui(){
  if(!pf)return;
  var cur=pf.getCurrentPageIndex(),tot=pf.getPageCount();
  document.getElementById("pf").style.width=(tot>1?Math.round(cur/(tot-1)*100):0)+"%";
  var pageText = "";
  if (cur === 0) {
    pageText = "Portada";
  } else if (cur >= tot - 1) {
    pageText = "Contraportada";
  } else {
    pageText = "Págs. " + cur + " - " + (cur + 1);
  }
  document.getElementById("pi").textContent = pageText;
  var atStart = (cur <= 0);
  var atEnd = (cur >= tot - 2);
  document.getElementById("bp").disabled=atStart;
  document.getElementById("bf").disabled=atStart;
  document.getElementById("bn").disabled=atEnd;
  document.getElementById("bl").disabled=atEnd;
  
  var innerSpine = document.getElementById("inner-spine-overlay");
  if (!innerSpine) {
    innerSpine = document.createElement("div");
    innerSpine.id = "inner-spine-overlay";
    innerSpine.className = "inner-spine";
    document.getElementById("book-container").appendChild(innerSpine);
  }
  innerSpine.style.display = (spineMode === 'inner' && cur > 0 && cur < tot - 1) ? "block" : "none";

  var flatSpine = document.getElementById("flat-spine-overlay");
  if (!flatSpine) {
    flatSpine = document.createElement("div");
    flatSpine.id = "flat-spine-overlay";
    flatSpine.className = "flat-spine";
    document.getElementById("book-container").appendChild(flatSpine);
  }
  if (coverData.type === 'spread' && cur === 0) {
    var bookEl = document.getElementById("book");
    var bookWidth = bookEl.offsetWidth;
    var spineWidth = Math.round(bookWidth * 0.028);
    flatSpine.style.width = spineWidth + "px";
    flatSpine.style.display = "block";
  } else {
    flatSpine.style.display = "none";
  }
}
document.addEventListener("keydown",function(e){if(!pf)return;if(e.target.tagName==="INPUT")return;if(e.key==="ArrowRight"||e.key==="ArrowDown")pf.flipNext(gcn());if(e.key==="ArrowLeft"||e.key==="ArrowUp")pf.flipPrev(gcn());if(e.key==="Home"){pf.turnToPage(0);ui();}if(e.key==="End"){pf.turnToPage(pf.getSettings().showCover ? pf.getPageCount()-1 : pf.getPageCount()-2);ui();}});
document.getElementById("bp").addEventListener("click",function(){if(pf)pf.flipPrev(gcn());});
document.getElementById("bn").addEventListener("click",function(){if(pf)pf.flipNext(gcn());});
document.getElementById("bf").addEventListener("click",function(){if(pf){pf.turnToPage(0);ui();}});
document.getElementById("bl").addEventListener("click",function(){if(pf){pf.turnToPage(pf.getSettings().showCover ? pf.getPageCount()-1 : pf.getPageCount()-2);ui();}});
window.addEventListener("DOMContentLoaded",reinit);
var resizeTimeout;
window.addEventListener("resize", function() {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(reinit, 300);
});
window.onerror = function(message, source, lineno, colno, error) {
  var file = source ? source.split('/').pop() : 'unknown';
  if (typeof le === 'function') {
    le("ERROR", message + " (" + file + ":" + lineno + ")");
  } else {
    console.error(message, source, lineno);
  }
  return false;
};
</script></body></html>
