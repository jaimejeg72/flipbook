<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Libro Digital — StPageFlip Demo</title>
  <meta name="description" content="Demostracion interactiva de un flipbook digital con animacion de paginas usando la libreria StPageFlip." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"><\/script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-deep:    #0b0c1a;
      --accent:     #c9a84c;
      --accent-lt:  #e8c96d;
      --accent-dim: #8a6a28;
      --text-light: #f0ead8;
      --text-muted: #9a8f72;
      --page-bg:    #fdf8ef;
      --page-text:  #2e2418;
    }
    html, body { height: 100%; font-family: "Inter", sans-serif; background: var(--bg-deep); color: var(--text-light); overflow-x: hidden; }
    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(80,60,160,.35) 0%, transparent 70%),
                  radial-gradient(ellipse 60% 40% at 20% 80%, rgba(30,20,80,.4) 0%, transparent 60%);
    }
    #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .wrapper { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    header { width: 100%; padding: 2rem 2rem 1rem; text-align: center; }
    header .eyebrow { font-family: "Inter", sans-serif; font-size: .7rem; font-weight: 500; letter-spacing: .35em; text-transform: uppercase; color: var(--accent); opacity: .8; margin-bottom: .6rem; }
    header h1 { font-family: "Cinzel", serif; font-size: clamp(1.6rem, 4vw, 2.8rem); font-weight: 700; background: linear-gradient(135deg, var(--accent-lt) 20%, var(--accent) 60%, var(--accent-dim) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: .04em; }
    header p.sub { margin-top: .5rem; font-size: .85rem; color: var(--text-muted); font-family: "Lora", serif; font-style: italic; }
    .divider { width: 120px; height: 1px; margin: 1rem auto; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
    .stage { position: relative; display: flex; flex-direction: column; align-items: center; padding: 1rem 1rem 2rem; width: 100%; flex: 1; }
    #book-container { position: relative; filter: drop-shadow(0 40px 60px rgba(0,0,0,.6)); }
    .page { background: var(--page-bg); color: var(--page-text); overflow: hidden; user-select: none; }
    .page.cover-front, .page.cover-back { background: #0d0e22; }
    .cover-front .cover-inner, .cover-back .cover-inner {
      width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #1a1040 0%, #0d0e22 50%, #1a0e35 100%);
      position: relative; overflow: hidden;
    }
    .cover-front .cover-inner::before { content: ""; position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(201,168,76,.15) 0%, transparent 70%); }
    .cover-ornament { width: 60%; max-width: 180px; opacity: .85; margin-bottom: 1.2rem; }
    .cover-title { font-family: "Cinzel", serif; font-size: clamp(.9rem, 3vw, 1.6rem); font-weight: 700; color: var(--accent-lt); text-align: center; letter-spacing: .1em; line-height: 1.3; z-index: 1; padding: 0 1rem; }
    .cover-subtitle { font-family: "Lora", serif; font-style: italic; font-size: clamp(.55rem, 1.5vw, .8rem); color: var(--accent-dim); margin-top: .6rem; letter-spacing: .08em; z-index: 1; }
    .cover-rule { width: 40%; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); margin: .8rem 0; z-index: 1; }
    .page-inner { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 8% 10%; background: #fdf8ef; position: relative; overflow: hidden; }
    .page-inner::before, .page-inner::after { content: "✦"; position: absolute; font-size: .7rem; color: var(--accent-dim); opacity: .5; }
    .page-inner::before { top: 8px; left: 10px; }
    .page-inner::after  { bottom: 8px; right: 10px; }
    .page-number { position: absolute; bottom: 8px; font-family: "Cinzel", serif; font-size: .55rem; color: var(--accent-dim); letter-spacing: .2em; left: 50%; transform: translateX(-50%); }
    .page-chapter { font-family: "Cinzel", serif; font-size: clamp(.55rem, 1.5vw, .75rem); font-weight: 600; color: var(--accent-dim); letter-spacing: .18em; text-transform: uppercase; margin-bottom: .5rem; }
    .page-title { font-family: "Cinzel", serif; font-size: clamp(.85rem, 2.2vw, 1.25rem); font-weight: 700; color: #2e2418; line-height: 1.3; margin-bottom: .6rem; }
    .page-rule { width: 40px; height: 2px; background: var(--accent); margin-bottom: .9rem; border-radius: 2px; }
    .page-body { font-family: "Lora", serif; font-size: clamp(.6rem, 1.6vw, .82rem); line-height: 1.75; color: #4a3c28; flex: 1; }
    .page-body p + p { margin-top: .6em; }
    .page-body em { color: #7a5c2e; }
    .pull-quote { border-left: 3px solid var(--accent); padding: .5rem .8rem; margin: .6rem 0; font-family: "Lora", serif; font-style: italic; font-size: clamp(.65rem, 1.7vw, .85rem); color: #5a4030; background: rgba(201,168,76,.07); border-radius: 0 4px 4px 0; }
    .controls { display: flex; align-items: center; gap: 1rem; margin-top: 1.8rem; flex-wrap: wrap; justify-content: center; }
    .btn { display: inline-flex; align-items: center; gap: .45rem; padding: .6rem 1.4rem; border-radius: 50px; border: 1px solid rgba(201,168,76,.4); background: rgba(201,168,76,.08); color: var(--accent-lt); font-family: "Inter", sans-serif; font-size: .82rem; font-weight: 500; letter-spacing: .04em; cursor: pointer; transition: background .2s, border-color .2s, transform .15s, box-shadow .2s; backdrop-filter: blur(6px); }
    .btn:hover { background: rgba(201,168,76,.18); border-color: var(--accent); box-shadow: 0 0 18px rgba(201,168,76,.25); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn svg { width: 16px; height: 16px; fill: currentColor; }
    .page-indicator { font-family: "Cinzel", serif; font-size: .78rem; color: var(--text-muted); letter-spacing: .12em; min-width: 90px; text-align: center; }
    .progress-wrap { width: min(700px, 90vw); margin-top: .8rem; }
    .progress-track { height: 3px; background: rgba(255,255,255,.08); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-dim), var(--accent-lt)); border-radius: 4px; width: 0%; transition: width .4s cubic-bezier(.4,0,.2,1); }
    footer { width: 100%; text-align: center; padding: 1.5rem 1rem 2rem; font-size: .72rem; color: rgba(154,143,114,.4); letter-spacing: .1em; }
    .hint { display: inline-flex; align-items: center; gap: .4rem; font-size: .72rem; color: var(--text-muted); opacity: .7; margin-top: .6rem; font-family: "Lora", serif; font-style: italic; }
    .hint svg { width: 13px; height: 13px; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .anim-in { animation: fadeInUp .7s ease both; }
  </style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="wrapper">
  <header class="anim-in">
    <div class="eyebrow">Demostracion Interactiva</div>
    <h1>Mi Libro Digital</h1>
    <p class="sub">Una experiencia de lectura inmersiva con StPageFlip</p>
    <div class="divider"></div>
  </header>
  <div class="stage anim-in">
    <div id="book-container">
      <div id="book">

        <!-- PAGE 0 · Cover Front (hard) -->
        <div class="page cover-front" data-density="hard">
          <div class="cover-inner">
            <svg class="cover-ornament" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="100" cy="100" r="90" stroke="#c9a84c" stroke-width="1" stroke-dasharray="4 4"/>
              <circle cx="100" cy="100" r="75" stroke="#c9a84c" stroke-width=".5" opacity=".6"/>
              <path d="M100 20 L108 92 L180 100 L108 108 L100 180 L92 108 L20 100 L92 92 Z" fill="none" stroke="#c9a84c" stroke-width="1.2"/>
              <circle cx="100" cy="100" r="12" fill="#c9a84c" opacity=".3"/>
              <circle cx="100" cy="100" r="6" fill="#c9a84c" opacity=".7"/>
              <path d="M100 40 C110 55 145 55 155 70 C165 85 155 115 145 125 C135 135 110 138 100 145 C90 138 65 135 55 125 C45 115 35 85 45 70 C55 55 90 55 100 40Z" stroke="#c9a84c" stroke-width=".8" fill="none" opacity=".4"/>
            </svg>
            <div class="cover-rule"></div>
            <div class="cover-title">Mi Libro<br/>Digital</div>
            <div class="cover-rule" style="margin-top:.8rem;"></div>
            <div class="cover-subtitle">Una historia de luz y sombra</div>
          </div>
        </div>

        <!-- PAGE 1 -->
        <div class="page">
          <div class="page-inner">
            <div class="page-chapter">Prologo</div>
            <div class="page-title">El Comienzo de Todo</div>
            <div class="page-rule"></div>
            <div class="page-body">
              <p>Habia una vez un mundo donde las paginas cobraban vida al ser tocadas. Cada hoja guardaba en su interior un universo completo, esperando el instante preciso para desplegarse ante los ojos del lector.</p>
              <div class="pull-quote">"Los libros son espejos: solo vemos en ellos lo que ya llevamos dentro."</div>
              <p>En ese lugar sin nombre ni coordenadas, vivia una pequeña biblioteca que nadie habia visitado en anos. Sus anaqueles de madera oscura sostenian volumenes cuyas portadas relucian con una luz propia, tenue y dorada como las brasas de un fuego a punto de apagarse.</p>
              <p>Un dia, una mano curiosa abrio la primera pagina...</p>
            </div>
            <div class="page-number">I</div>
          </div>
        </div>

        <!-- PAGE 2 -->
        <div class="page">
          <div class="page-inner">
            <div class="page-chapter">Capitulo I</div>
            <div class="page-title">La Biblioteca Olvidada</div>
            <div class="page-rule"></div>
            <div class="page-body">
              <p>El polvo flotaba en suspension perfecta, detenido en el tiempo, como si el aire mismo hubiera decidido guardar silencio para no perturbar la paz del lugar. Las ventanas altas dejaban pasar rayos de luz oblicuos que trazaban caminos de oro sobre el suelo de madera.</p>
              <p>Elena avanzo entre los estantes con cautela. Sus dedos rozaban los lomos de los libros sin atreverse a sacar ninguno. Era como si supiera que abrir uno de ellos cambiaria todo para siempre.</p>
              <p>Entonces lo vio. Un libro delgado, encuadernado en cuero azul oscuro, con letras doradas que parecian moverse cuando uno intentaba leerlas.</p>
            </div>
            <div class="page-number">II</div>
          </div>
        </div>

        <!-- PAGE 3 -->
        <div class="page">
          <div class="page-inner">
            <div class="page-chapter">Capitulo II</div>
            <div class="page-title">Las Palabras que Danzan</div>
            <div class="page-rule"></div>
            <div class="page-body">
              <p>La primera linea del libro decia: <em>"Todo lo que leas aqui habra sucedido."</em> Elena fruncio el ceno. Las palabras cambiaban de lugar mientras parpadeaba, reordenandose en frases nuevas que nunca terminaban de tener sentido.</p>
              <div class="pull-quote">"El idioma de los suenos no necesita gramatica."</div>
              <p>Paso una pagina. Y otra. Cada una revelaba un fragmento de un mundo que ella reconocia sin haberlo visitado jamas: montanas de cristal, rios que fluian hacia arriba, ciudades construidas sobre nubes.</p>
              <p>No supo cuanto tiempo estuvo leyendo. Cuando levanto la vista, la biblioteca habia desaparecido.</p>
            </div>
            <div class="page-number">III</div>
          </div>
        </div>

        <!-- PAGE 4 -->
        <div class="page">
          <div class="page-inner">
            <div class="page-chapter">Capitulo III</div>
            <div class="page-title">El Pais de las Paginas</div>
            <div class="page-rule"></div>
            <div class="page-body">
              <p>Estaba de pie sobre una colina de papel. El viento doblaba las hojas como olas y el horizonte se dibujaba con lineas de tinta fresca. Cada paso que daba dejaba una huella impresa en el suelo, como si su existencia aqui fuera una forma de escritura.</p>
              <p>A lo lejos, una figura avanzaba hacia ella. Un anciano de cabello blanco que llevaba bajo el brazo un libro identico al que ella habia abierto en la biblioteca.</p>
              <p>--Te estaba esperando --dijo cuando estuvo cerca--. Aqui todos los lectores terminan llegando tarde o temprano.</p>
            </div>
            <div class="page-number">IV</div>
          </div>
        </div>

        <!-- PAGE 5 -->
        <div class="page">
          <div class="page-inner">
            <div class="page-chapter">Capitulo IV</div>
            <div class="page-title">El Guardian de las Historias</div>
            <div class="page-rule"></div>
            <div class="page-body">
              <p>El anciano se llamaba a si mismo el Guardian. Llevaba siglos reuniendo los fragmentos de historias que los lectores abandonaban a mitad: personajes sin final, tramas inconclusas, mundos a medias construidos.</p>
              <p>--Por que no terminan sus libros? --pregunto Elena.</p>
              <p>--Porque el final da miedo --respondio el--. Terminar un libro significa aceptar que esa realidad ya no crecera mas. Muchos prefieren dejarlos abiertos, eternamente posibles.</p>
              <div class="pull-quote">"Un libro sin final es una puerta entreabierta hacia lo infinito."</div>
            </div>
            <div class="page-number">V</div>
          </div>
        </div>

        <!-- PAGE 6 -->
        <div class="page">
          <div class="page-inner">
            <div class="page-chapter">Capitulo V</div>
            <div class="page-title">El Regreso</div>
            <div class="page-rule"></div>
            <div class="page-body">
              <p>El Guardian le enseno a Elena como los mundos se tejian con palabras y como cada lector era tambien un autor sin saberlo. Cada imagen que se formaba en su mente al leer era una creacion suya, unica e irrepetible.</p>
              <p>--Ningun libro es igual para dos personas --explico--. Tu escribes mientras lees.</p>
              <p>Cuando llego el momento de volver, Elena sostuvo el libro azul contra su pecho y cerro los ojos. Sintio el suelo de papel disolverse bajo sus pies, el viento de tinta dispersarse, el horizonte doblarse sobre si mismo.</p>
              <p>Abrio los ojos. Estaba de nuevo en la biblioteca.</p>
            </div>
            <div class="page-number">VI</div>
          </div>
        </div>

        <!-- PAGE 7 -->
        <div class="page">
          <div class="page-inner">
            <div class="page-chapter">Epilogo</div>
            <div class="page-title">La Pagina en Blanco</div>
            <div class="page-rule"></div>
            <div class="page-body">
              <p>Elena devolvio el libro azul a su lugar en el anaquel. Pero antes de soltarlo, abrio la ultima pagina. Estaba en blanco. Una invitacion.</p>
              <p>Saco un lapiz del bolsillo y escribio una sola linea: <em>"Continuara..."</em></p>
              <p>Salio de la biblioteca con paso ligero. Afuera, el sol pintaba el cielo de ese dorado particular que solo existe en los momentos que valen la pena recordar.</p>
              <div class="pull-quote">"Leer es vivir varias vidas en una sola."</div>
              <p style="text-align:center; font-family:'Cinzel',serif; font-size:.9em; margin-top:1em; color:#7a5c2e;">--- Fin ---</p>
            </div>
            <div class="page-number">VII</div>
          </div>
        </div>

        <!-- PAGE 8 · Cover Back (hard) -->
        <div class="page cover-back" data-density="hard">
          <div class="cover-inner">
            <svg class="cover-ornament" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="100" cy="100" r="80" stroke="#c9a84c" stroke-width=".8" stroke-dasharray="2 6"/>
              <path d="M60 100 Q100 60 140 100 Q100 140 60 100Z" stroke="#c9a84c" stroke-width="1.2" fill="none" opacity=".7"/>
              <circle cx="100" cy="100" r="8" fill="#c9a84c" opacity=".5"/>
            </svg>
            <div class="cover-rule"></div>
            <div class="cover-subtitle" style="font-size:.9rem; letter-spacing:.2em;">F I N</div>
          </div>
        </div>

      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="btn-prev" aria-label="Pagina anterior">
        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        Anterior
      </button>
      <span class="page-indicator" id="page-indicator">Portada</span>
      <button class="btn" id="btn-next" aria-label="Pagina siguiente">
        Siguiente
        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>
    </div>

    <div class="hint">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
      Haz clic en los bordes del libro o usa los botones para voltear paginas
    </div>
  </div>

  <footer>&copy; 2026 &middot; StPageFlip Demo &middot; Creado con amor y cafe</footer>
</div>

<script>
(function(){
  var canvas = document.getElementById('particles');
  var ctx = canvas.getContext('2d');
  var W, H, pts;
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function init(){ pts = []; for(var i=0;i<60;i++) pts.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.2,dx:(Math.random()-.5)*.15,dy:(Math.random()-.5)*.15,o:Math.random()*.5+.1}); }
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(function(p){
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(201,168,76,'+p.o+')'; ctx.fill();
      p.x+=p.dx; p.y+=p.dy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    });
    requestAnimationFrame(draw);
  }
  resize(); init(); draw();
  window.addEventListener('resize',function(){ resize(); init(); });
})();

window.addEventListener('DOMContentLoaded', function(){
  function getBookSize(){
    var vw=window.innerWidth, vh=window.innerHeight;
    var w=Math.min(Math.floor((vw-40)/2),380);
    var h=Math.min(Math.floor(w*1.45),Math.floor(vh*.62));
    w=Math.floor(h/1.45);
    return {width:w,height:h};
  }
  var size=getBookSize();
  var pageFlip=new St.PageFlip(document.getElementById('book'),{
    width:size.width, height:size.height,
    showCover:true, mobileScrollSupport:false,
    maxShadowOpacity:.5, flippingTime:800,
    usePortrait:window.innerWidth<600,
    drawShadow:true, autoSize:true
  });
  pageFlip.loadFromHTML(document.querySelectorAll('.page'));

  function updateUI(){
    var current=pageFlip.getCurrentPageIndex();
    var total=pageFlip.getPageCount();
    var fill=document.getElementById('progress-fill');
    var ind=document.getElementById('page-indicator');
    var pct=total>1?Math.round((current/(total-1))*100):0;
    fill.style.width=pct+'%';
    if(current===0) ind.textContent='Portada';
    else if(current===total-1) ind.textContent='Contraportada';
    else ind.textContent='Pagina '+current+' de '+(total-2);
  }

  pageFlip.on('flip',updateUI);
  pageFlip.on('changeOrientation',updateUI);
  pageFlip.on('init',updateUI);

  document.getElementById('btn-prev').addEventListener('click',function(){ pageFlip.flipPrev('bottom'); });
  document.getElementById('btn-next').addEventListener('click',function(){ pageFlip.flipNext('bottom'); });
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key==='ArrowDown') pageFlip.flipNext('bottom');
    if(e.key==='ArrowLeft'||e.key==='ArrowUp') pageFlip.flipPrev('bottom');
  });
  updateUI();
});
</script>
</body>
</html>
